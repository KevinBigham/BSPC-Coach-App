name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - '.firebaserc'
      - 'firebase.json'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Functions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install project dependencies
        run: npm ci --legacy-peer-deps

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Verify shared functions copy
        run: npm run sync:functions-shared:verify

      - name: Test functions
        working-directory: functions
        run: npm test

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          # --force auto-confirms deletion of orphan functions removed from source
          # (e.g. when a callable is deleted in a sprint). Without it, the deploy
          # aborts in non-interactive mode.
          args: deploy --only functions --project bspc-coach --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
