name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Install parent portal dependencies
        working-directory: parent-portal
        run: npm ci

      - name: Verify shared functions copy
        run: npm run sync:functions-shared:verify

      - name: Run quality gates
        run: npm run quality

      - name: Run dead-code/dependency gate
        run: npm run quality:dead-code

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
